<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - HealthSlot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #00a8e8, #00c9ff);
            padding: 20px;
            animation: fadeInUp 0.8s ease-out;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 28px;
            margin: 0 0 10px;
            color: #1a1a1a;
        }

        .login-header p {
            color: #666;
            margin: 0;
        }

        .login-form {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00a8e8;
            box-shadow: 0 0 0 3px rgba(0, 168, 232, 0.1);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-forgot a {
            color: #00a8e8;
            text-decoration: none;
            transition: color 0.3s;
        }

        .remember-forgot a:hover {
            color: #0095c9;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00a8e8, #00c9ff);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 168, 232, 0.4);
        }

        .login-divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 14px;
        }

        .signup-link {
            text-align: center;
            color: #666;
        }

        .signup-link a {
            color: #00a8e8;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: #0095c9;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #f44336;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-text {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1><i class="fas fa-hospital"></i> HealthSlot</h1>
                <p>Đăng nhập tài khoản của bạn</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="error-message" id="errorMessage"></div>

                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" placeholder="Nhập email của bạn" required>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                </div>

                <div class="remember-forgot">
                    <label style="margin: 0;">
                        <input type="checkbox" id="remember"> Nhớ mật khẩu
                    </label>
                    <a href="#" onclick="alert('Vui lòng liên hệ hỗ trợ để đặt lại mật khẩu')">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="login-btn">
                    <div class="btn-text">
                        <div class="loading-spinner" id="loadingSpinner"></div>
                        <span id="btnText">Đăng nhập</span>
                    </div>
                </button>
            </form>

            <div class="login-divider">Hoặc</div>

            <div class="signup-link">
                Chưa có tài khoản? <a href="signup.html">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <script src="../js/utils/constants.js"></script>
    <script src="../js/utils/storage.js"></script>
    <script src="../js/modules/auth.js"></script>

    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberCheckbox = document.getElementById('remember');
        const errorMessage = document.getElementById('errorMessage');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const btnText = document.getElementById('btnText');

        // Restore email if remembered
        window.addEventListener('load', () => {
            const savedEmail = localStorage.getItem('savedEmail');
            if (savedEmail) {
                emailInput.value = savedEmail;
                rememberCheckbox.checked = true;
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.style.display = 'none';

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Vui lòng điền đầy đủ thông tin');
                return;
            }

            // Save email if checked
            if (rememberCheckbox.checked) {
                localStorage.setItem('savedEmail', email);
            } else {
                localStorage.removeItem('savedEmail');
            }

            // Disable button and show loading
            loadingSpinner.style.display = 'block';
            loginForm.querySelector('button').disabled = true;
            btnText.textContent = 'Đang đăng nhập...';

            const result = await AuthModule.login(email, password);

            loadingSpinner.style.display = 'none';
            loginForm.querySelector('button').disabled = false;
            btnText.textContent = 'Đăng nhập';

            if (result.success) {
                // Show success message
                alert('✅ Đăng nhập thành công');
                // Redirect to home page
                window.location.href = '/';
            } else {
                showError(result.message);
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            errorMessage.scrollIntoView({ behavior: 'smooth' });
        }

        // Test account
        window.addEventListener('load', () => {
            // Pre-fill test account for demo
            // emailInput.value = 'test@example.com';
            // passwordInput.value = '123456';
        });
    </script>
</body>
</html>
